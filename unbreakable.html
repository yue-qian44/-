<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unbreakable · 晚安迅</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0b0a1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 1rem;
            background: radial-gradient(circle at 30% 30%, #1e1948, #070614);
            color: #eae4ff;
        }

        /* 主卡片 */
        .lyric-card {
            width: 100%;
            max-width: 700px;
            height: 85vh;
            max-height: 800px;
            background: rgba(12, 10, 25, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(200, 170, 255, 0.2);
            border-radius: 48px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 180, 255, 0.1) inset;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 1.8rem 1.5rem 1.2rem;
        }

        /* 歌曲信息区域 */
        .song-header {
            text-align: center;
            margin-bottom: 2rem;
            position: relative;
        }

        .song-title {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #ffffff, #d9cbff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-block;
            padding: 0 0.5rem;
            text-shadow: 0 0 15px #aa7eff;
        }

        .song-artist {
            font-size: 1.2rem;
            color: #bcacf0;
            margin-top: 0.25rem;
            opacity: 0.9;
            font-weight: 400;
            border-bottom: 1px dashed rgba(200, 170, 255, 0.4);
            padding-bottom: 0.8rem;
        }

        .writing-credit {
            font-size: 0.9rem;
            color: #8879b0;
            margin-top: 0.4rem;
            background: rgba(255,255,255,0.02);
            padding: 0.2rem 1rem;
            border-radius: 40px;
            display: inline-block;
        }

        /* 歌词滚动区域 */
        .lyrics-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem 1rem 0.5rem 0.5rem;
            mask-image: linear-gradient(to bottom, transparent, black 5%, black 95%, transparent);
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 5%, black 95%, transparent);
            scroll-behavior: smooth;
            scrollbar-width: thin;
            scrollbar-color: #b180ff #2a1f4a;
        }

        .lyrics-scroll::-webkit-scrollbar {
            width: 5px;
        }

        .lyrics-scroll::-webkit-scrollbar-track {
            background: #2a1f4a;
            border-radius: 20px;
        }

        .lyrics-scroll::-webkit-scrollbar-thumb {
            background: #b180ff;
            border-radius: 20px;
        }

        /* 歌词条目 */
        .lyric-line {
            margin-bottom: 1.2rem;
            padding: 0.2rem 0.8rem;
            border-radius: 28px;
            transition: background 0.2s, transform 0.2s;
            transform-origin: left;
        }

        .lyric-line:hover {
            background: rgba(140, 100, 255, 0.15);
            transform: scale(1.01);
            backdrop-filter: blur(2px);
        }

        .en {
            font-size: 1.2rem;
            font-weight: 600;
            color: #f0e9ff;
            line-height: 1.4;
            letter-spacing: 0.3px;
            text-shadow: 0 2px 5px #00000050;
        }

        .zh {
            font-size: 1rem;
            color: #c7b3ff;
            margin-top: 0.25rem;
            padding-left: 0.8rem;
            border-left: 3px solid #ffb27f;
            opacity: 0.9;
            line-height: 1.4;
            font-weight: 400;
        }

        /* 特殊行 (如 Hy-per / Woahhhh) 可居中或不同风格 */
        .special .en {
            color: #ffddb0;
            font-style: italic;
            text-shadow: 0 0 8px #f90;
        }

        .special .zh {
            border-left-color: #fcaa5e;
        }

        /* 底部装饰 */
        .footer-note {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.9rem;
            color: #6a5c8c;
            letter-spacing: 2px;
            border-top: 1px solid rgba(200,170,255,0.2);
            padding-top: 1rem;
            display: flex;
            justify-content: center;
            gap: 1.2rem;
        }

        .footer-note span {
            opacity: 0.7;
        }

        .playing-indicator {
            display: flex;
            gap: 5px;
            justify-content: center;
            align-items: center;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: #b180ff;
            border-radius: 50%;
            animation: bounce 1.2s infinite alternate;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; background: #d7b0ff; }
        .dot:nth-child(3) { animation-delay: 0.4s; background: #ffb27f; }

        @keyframes bounce {
            0% { transform: translateY(0); opacity: 0.3; }
            100% { transform: translateY(-6px); opacity: 1; }
        }

        #playButton {
            margin-top: 20px;
            padding: 12px 24px;
            font-size: 1.2em;
            background: #ffffff;
            color: #c2cad4;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #playButton:hover {
            background: #e0e0e0;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="lyric-card">
        <div class="song-header">
            <div class="song-title">Unbreakable</div>
            <div class="song-artist">Hyper Potions / Danyka Nadeau</div>
            <div class="writing-credit">Written by：Michael Benton Small/Todd N. Terry/Nathaniel Phillip Hall</div>
        </div>

        <!-- 歌词容器 -->
        <div class="lyrics-scroll" id="lyricsContainer">
        </div>

        <div class="footer-note">
            <span>🎵 人,加油!</span>
            <div class="playing-indicator">
                <div class="dot"></div>

                const lineDiv = document.createElement('div');
                lineDiv.className = 'lyric-line';

                if (item.en.includes('Hy-per') || item.en.includes('Woahhhh') || item.en === "Hold me down") {
                    lineDiv.classList.add('special');
                }

    </script>
    <style>
        .zh:empty { display: none; }
        .lyric-line:last-child { margin-bottom: 0.5rem; }
        /* 手机优化 */
        @media (max-width: 450px) {
            .song-title { font-size: 1.8rem; }
            .en { font-size: 1rem; }
            .zh { font-size: 0.9rem; }
            .lyric-card { padding: 1rem 0.8rem; }
        }
    </style>

    
</body>

</html>
